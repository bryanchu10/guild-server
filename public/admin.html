<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Guild Hall — 管理員</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117; color: #e6edf3;
      font-family: 'Courier New', monospace;
      padding: 32px; max-width: 700px; margin: 0 auto;
    }
    h1 { color: #58a6ff; font-size: 18px; margin-bottom: 24px; }
    h2 { color: #8b949e; font-size: 13px; margin: 24px 0 10px; text-transform: uppercase; letter-spacing: 1px; }
    .card {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; padding: 14px 16px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 12px;
    }
    .username { flex: 1; font-size: 14px; }
    .badge {
      font-size: 10px; padding: 2px 8px; border-radius: 10px;
      background: #21262d; color: #8b949e;
    }
    .badge.approved { background: #1a3a24; color: #3fb950; }
    .badge.pending  { background: #2a1f00; color: #f0883e; }
    button {
      background: none; border: 1px solid #30363d; color: #8b949e;
      padding: 4px 12px; border-radius: 6px;
      font-family: monospace; font-size: 11px; cursor: pointer;
    }
    button:hover { border-color: #58a6ff; color: #58a6ff; }
    button.danger:hover { border-color: #f85149; color: #f85149; }
    button.approve:hover { border-color: #3fb950; color: #3fb950; }
    .add-form {
      display: flex; gap: 8px; margin-top: 10px;
    }
    .add-form input {
      flex: 1; background: #161b22; border: 1px solid #30363d;
      color: #e6edf3; padding: 6px 10px; border-radius: 6px;
      font-family: monospace; font-size: 13px; outline: none;
    }
    .add-form input:focus { border-color: #58a6ff; }
    .add-form button { background: #238636; color: #fff; border-color: #238636; }
    .add-form button:hover { background: #2ea043; border-color: #2ea043; color: #fff; }
    #msg { font-size: 12px; color: #8b949e; margin-top: 8px; min-height: 18px; }
    .empty { color: #444; font-size: 13px; padding: 12px 0; }
  </style>
</head>
<body>
<h1>⚔ Guild Hall 管理員</h1>

<h2>直接新增成員</h2>
<div class="add-form">
  <input id="add-input" placeholder="GitHub username" maxlength="39"
         onkeydown="if(event.key==='Enter') addMember()" />
  <button onclick="addMember()">新增核准</button>
</div>
<div id="msg"></div>

<h2>待審申請 <span id="pending-count"></span></h2>
<div id="pending-list"></div>

<h2>已核准成員 <span id="approved-count"></span></h2>
<div id="approved-list"></div>

<script>
// 從 URL 取得 admin secret（?secret=xxx）
const secret = new URLSearchParams(location.search).get('secret') || '';
if (!secret) {
  document.body.innerHTML = '<p style="color:#f85149;padding:32px">請在 URL 附上 ?secret=你的管理員密碼</p>';
}

const headers = { 'Content-Type': 'application/json', 'x-admin-secret': secret };

async function loadMembers() {
  const res  = await fetch('/api/members', { headers });
  if (!res.ok) { alert('密碼錯誤或無法連線'); return; }
  const data = await res.json();
  renderPending(data.pending || []);
  renderApproved(data.approved || []);
}

function renderPending(list) {
  const el = document.getElementById('pending-list');
  document.getElementById('pending-count').textContent = `(${list.length})`;
  if (!list.length) {
    el.innerHTML = '<div class="empty">無待審申請</div>';
    return;
  }
  el.innerHTML = list.map(u => `
    <div class="card">
      <span class="username">${u}</span>
      <span class="badge pending">待審</span>
      <button class="approve" onclick="approve('${u}')">核准</button>
      <button class="danger"  onclick="remove('${u}')">拒絕</button>
    </div>`).join('');
}

function renderApproved(list) {
  const el = document.getElementById('approved-list');
  document.getElementById('approved-count').textContent = `(${list.length})`;
  if (!list.length) {
    el.innerHTML = '<div class="empty">尚無成員</div>';
    return;
  }
  el.innerHTML = list.map(u => `
    <div class="card">
      <span class="username">${u}</span>
      <span class="badge approved">已核准</span>
      <a href="https://github.com/${u}" target="_blank">
        <button>GitHub ↗</button>
      </a>
      <button class="danger" onclick="remove('${u}')">移除</button>
    </div>`).join('');
}

async function approve(username) {
  await fetch(`/api/members/${username}/approve`, { method: 'POST', headers });
  loadMembers();
}

async function remove(username) {
  if (!confirm(`確定要移除 ${username}？`)) return;
  await fetch(`/api/members/${username}`, { method: 'DELETE', headers });
  loadMembers();
}

async function addMember() {
  const username = document.getElementById('add-input').value.trim();
  const msg      = document.getElementById('msg');
  if (!username) return;
  const res  = await fetch('/api/members', {
    method: 'POST', headers,
    body: JSON.stringify({ username }),
  });
  const data = await res.json();
  if (data.ok) {
    msg.style.color = '#3fb950';
    msg.textContent = `✓ ${username} 已新增`;
    document.getElementById('add-input').value = '';
    loadMembers();
  } else {
    msg.style.color = '#f85149';
    msg.textContent = data.error || '新增失敗';
  }
}

loadMembers();
setInterval(loadMembers, 15000); // 每 15 秒自動重整
</script>
</body>
</html>
