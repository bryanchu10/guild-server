<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>GitHub 公會大廳</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; gap: 8px;
      font-family: 'Courier New', monospace;
    }
    h1 { color: #58a6ff; font-size: 16px; letter-spacing: 3px; }
    #status-bar {
      width: 800px; display: flex;
      justify-content: space-between; align-items: center;
    }
    #conn-status { font-size: 11px; color: #8b949e; }
    #join-btn {
      background: none; border: 1px solid #30363d;
      color: #8b949e; padding: 4px 12px; border-radius: 6px;
      font-family: monospace; font-size: 11px; cursor: pointer;
    }
    #join-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    #log {
      width: 800px; background: #161b22;
      border: 1px solid #30363d; border-radius: 6px;
      padding: 6px 12px; min-height: 52px; max-height: 52px; overflow: hidden;
    }
    .le { font-size: 11px; padding: 1px 0; }
    .push   { color: #f0883e; } .pr     { color: #a371f7; }
    .merge  { color: #3fb950; } .review { color: #58a6ff; }
    .bug    { color: #f85149; }

    /* 申請加入面板 */
    #join-panel {
      display: none;
      position: fixed; bottom: 24px; right: 24px;
      background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; padding: 16px; width: 260px;
      z-index: 100; font-family: monospace;
    }
    #join-panel h3 { color: #e6edf3; font-size: 13px; margin-bottom: 10px; }
    #join-panel input {
      width: 100%; background: #0d1117; border: 1px solid #30363d;
      color: #e6edf3; padding: 6px 8px; border-radius: 6px;
      font-family: monospace; font-size: 12px; outline: none; margin-bottom: 8px;
    }
    #join-panel input:focus { border-color: #58a6ff; }
    #join-panel .btns { display: flex; gap: 6px; }
    #join-panel button {
      flex: 1; padding: 6px; border: none; border-radius: 6px;
      font-family: monospace; font-size: 12px; cursor: pointer;
    }
    #join-submit { background: #238636; color: #fff; }
    #join-submit:hover { background: #2ea043; }
    #join-cancel { background: #21262d; color: #8b949e; }
    #join-msg { font-size: 11px; color: #8b949e; margin-top: 6px; min-height: 16px; }

    /* App 安裝提示 */
    #install-banner {
      display: none;
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      background: #1f2937; border: 1px solid #f0883e;
      border-radius: 8px; padding: 10px 18px;
      color: #f0883e; font-size: 12px; font-family: monospace;
      z-index: 100; white-space: nowrap;
    }
    #install-banner a { color: #58a6ff; }
  </style>
</head>
<body>
<h1>⚔  G I T H U B   G U I L D   H A L L  ⚔</h1>

<div id="status-bar">
  <span id="conn-status">● 連線中...</span>
  <button id="join-btn" onclick="toggleJoinPanel()">申請加入</button>
</div>

<div id="game-container"></div>
<div id="log"><span style="color:#444">// 等待成員活動...</span></div>

<!-- 申請加入面板 -->
<div id="join-panel">
  <h3>申請加入公會</h3>
  <input id="join-username" placeholder="你的 GitHub username" maxlength="39" />
  <div class="btns">
    <button id="join-submit" onclick="submitJoin()">送出申請</button>
    <button id="join-cancel" onclick="toggleJoinPanel()">取消</button>
  </div>
  <div id="join-msg"></div>
</div>

<!-- App 安裝提示（管理員核准後顯示） -->
<div id="install-banner" id="install-banner">
  請安裝 GitHub App 以讓活動出現在大廳：
  <a id="install-link" href="#" target="_blank">點此安裝</a>
</div>

<script>
const R    = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
const PICK = a => a[R(0, a.length - 1)];

// ── 顏色調色盤（依 username hash 決定） ──────────────────────
const PALETTES = [
  { bc: 0xe74c3c, hc: 0xf1948a }, { bc: 0x2980b9, hc: 0x7fb3d3 },
  { bc: 0x27ae60, hc: 0x58d68d }, { bc: 0xe67e22, hc: 0xf0b27a },
  { bc: 0x9b59b6, hc: 0xc39bd3 }, { bc: 0x16a085, hc: 0x76d7c4 },
  { bc: 0xc0392b, hc: 0xe57373 }, { bc: 0x2471a3, hc: 0x85c1e9 },
];
function hashPalette(name) {
  let h = 0;
  for (const c of name) h = (Math.imul(31, h) + c.charCodeAt(0)) | 0;
  return PALETTES[Math.abs(h) % PALETTES.length];
}

// ── Phaser 場景 ───────────────────────────────────────────────
class Guild extends Phaser.Scene {
  constructor() {
    super('G');
    this.roster   = new Map(); // username → container
    this.evQueue  = [];
    this.qRunning = false;
  }

  create() {
    this.drawHall();
    this.waitMsg = this.add.text(400, 390, '等待成員加入...', {
      fontSize: '14px', fontFamily: 'monospace', color: '#444444',
    }).setOrigin(0.5).setDepth(30);
    window._guild = this;
    // WebSocket 比 Phaser 快，處理已暫存的 init
    if (pendingInit) {
      pendingInit.members.forEach(u => this.addMember(u));
      pendingInit = null;
    }
  }

  // ── 由 WebSocket 呼叫 ────────────────────────────────────────
  addMember(username) {
    if (this.roster.has(username)) return;
    if (this.waitMsg) { this.waitMsg.destroy(); this.waitMsg = null; }
    this._spawnChar(username); // idle 在淡入完成後自動啟動
  }

  removeMember(username) {
    const c = this.roster.get(username);
    if (!c) return;
    this.roster.delete(username);
    c.timer?.destroy();
    this.tweens.killTweensOf(c);
    this.tweens.add({
      targets: c, alpha: 0, duration: 400,
      onComplete: () => c.destroy(),
    });
  }

  pushServerEvent({ actor, action }) {
    if (!action) return;
    this.evQueue.push({ username: actor, action });
    if (!this.qRunning) this._runQueue();
  }

  // ── 事件佇列 ────────────────────────────────────────────────
  _runQueue() {
    if (this.evQueue.length === 0) { this.qRunning = false; return; }
    this.qRunning = true;

    const { username, action } = this.evQueue.shift();

    // 若該成員還沒有角色，先建立
    if (!this.roster.has(username)) this.addMember(username);
    const c = this.roster.get(username);
    if (!c || c.busy) {
      this.time.delayedCall(200, () => this._runQueue());
      return;
    }

    c.busy = true;
    c.timer?.destroy();
    this.tweens.killTweensOf(c);

    // action.tx / action.ty 是 server 算好的數字
    this.go(c, action.tx, action.ty, () => {
      this.popup(c, action.icon + ' ' + action.msg, action.col, () => {
        addLog(action, username);
        c.busy = false;
        this.time.delayedCall(400, () => {
          this.idle(c);
          this._runQueue();
        });
      });
    });
  }

  // ── 場景繪製 ─────────────────────────────────────────────────
  drawHall() {
    const g = this.add.graphics();
    g.fillStyle(0x5a3118); g.fillRect(0, 0, 800, 270);
    g.lineStyle(1, 0x3d2007, 0.45);
    for (let y = 0; y < 270; y += 36) {
      const odd = Math.floor(y / 36) % 2;
      for (let x = odd ? -50 : 0; x < 800; x += 100) g.strokeRect(x, y, 100, 36);
    }
    g.fillStyle(0x9b7422); g.fillRect(0, 270, 800, 210);
    g.lineStyle(1, 0x886219, 0.4);
    for (let y = 285; y < 480; y += 28) g.lineBetween(0, y, 800, y);
    for (let x = 0; x < 800; x += 55)  g.lineBetween(x, 270, x, 480);
    g.fillStyle(0x3d2007); g.fillRect(0, 267, 800, 5);
    [185, 545].forEach(wx => {
      g.fillStyle(0x3d2007); g.fillRect(wx - 5, 62, 90, 78);
      g.fillStyle(0x87ceeb, 0.5); g.fillRect(wx, 67, 80, 68);
      g.fillStyle(0x3d2007); g.fillRect(wx + 37, 67, 6, 68); g.fillRect(wx, 98, 80, 5);
      g.fillStyle(0xffffff, 0.04);
      g.fillTriangle(wx + 40, 135, wx - 15, 272, wx + 95, 272);
    });
    g.fillStyle(0x6b3e1e); g.fillRect(55, 148, 116, 88);
    g.fillStyle(0xd4b483); g.fillRect(60, 153, 106, 78);
    [[65,158,46,22],[117,158,41,22],[65,186,93,18]].forEach(([x,y,w,h]) => {
      g.fillStyle(0xfff9e6); g.fillRect(x, y, w, h);
    });
    g.fillStyle(0xcc3333); g.fillCircle(113, 153, 4);
    this.add.text(113, 143, '公告欄', { fontSize:'10px', fontFamily:'serif', color:'#c8a050' }).setOrigin(0.5);
    g.fillStyle(0x4a2810); g.fillRect(685, 118, 98, 152);
    g.fillStyle(0x111111); g.fillRect(700, 143, 68, 115);
    g.fillStyle(0x5a3118); g.fillRect(677, 112, 114, 10);
    const gl = this.add.graphics().setDepth(1);
    gl.fillStyle(0xff7700, 0.055); gl.fillCircle(734, 270, 165);
    this.fireG = this.add.graphics().setDepth(2);
    this.time.addEvent({ delay: 85, loop: true, callback: this.flicker, callbackScope: this });
    [[245, 388], [530, 388]].forEach(([tx, ty]) => {
      g.fillStyle(0x6b3e1e); g.fillRect(tx-55, ty+20, 9, 28); g.fillRect(tx+46, ty+20, 9, 28);
      g.fillStyle(0x8b5a2b); g.fillRect(tx - 65, ty, 130, 22);
      g.lineStyle(1, 0xb8845a, 0.4); g.lineBetween(tx - 60, ty + 4, tx + 60, ty + 4);
    });
    this.add.text(400, 26, '── G U I L D   H A L L ──', {
      fontSize:'14px', fontFamily:'Georgia, serif', color:'#f5d076', stroke:'#3d2007', strokeThickness:3,
    }).setOrigin(0.5);
  }

  flicker() {
    const g = this.fireG, cx = 734, base = 255, f = () => Math.random();
    g.clear();
    g.fillStyle(0xff2200, 0.70 + f()*.25); g.fillTriangle(cx+(f()-.5)*10, base-80-f()*18, cx-28, base, cx+28, base);
    g.fillStyle(0xff7700, 0.65 + f()*.20); g.fillTriangle(cx+(f()-.5)*7,  base-55-f()*12, cx-18, base, cx+18, base);
    g.fillStyle(0xffcc00, 0.50 + f()*.20); g.fillTriangle(cx+(f()-.5)*4,  base-32-f()*8,  cx-10, base, cx+12, base);
  }

  // ── 角色 ────────────────────────────────────────────────────
  _spawnChar(username) {
    const pal = hashPalette(username);
    // 隨機出生在地板區域
    const x = R(80, 720), y = R(310, 440);
    const c = this.add.container(x, y).setDepth(5);
    const g = this.add.graphics();
    g.fillStyle(pal.bc, 0.65); g.fillRect(-7, 9, 6, 14); g.fillRect(1, 9, 6, 14);
    g.fillStyle(pal.bc, 1);    g.fillRoundedRect(-11, -12, 22, 22, 3);
    g.fillStyle(pal.hc, 1);    g.fillCircle(0, -22, 13);
    g.fillStyle(0x222222);     g.fillCircle(-4, -23, 2.5); g.fillCircle(4, -23, 2.5);
    g.fillStyle(0xffffff);     g.fillCircle(-3, -24, 1);   g.fillCircle(5, -24, 1);
    const display = username.length > 14 ? username.substring(0, 12) + '..' : username;
    const lbl = this.add.text(0, 14, display, {
      fontSize: '9px', fontFamily: 'monospace',
      color: '#fff', stroke: '#000', strokeThickness: 3,
    }).setOrigin(0.5, 0);
    c.add([g, lbl]);
    c.gfx = g; c.busy = false; c.timer = null;
    c.setAlpha(0);
    this.tweens.add({
      targets: c, alpha: 1, duration: 500,
      onComplete: () => this.idle(c),
    });
    this.roster.set(username, c);
    return c;
  }

  // ── 走動 ─────────────────────────────────────────────────────
  idle(c) {
    if (c.busy) return;
    c.timer?.destroy(); this.tweens.killTweensOf(c);
    const tx = R(75, 720), ty = R(305, 445);
    const dist = Phaser.Math.Distance.Between(c.x, c.y, tx, ty);
    this.tweens.add({
      targets: c, x: tx, y: ty, duration: dist * 5.5, ease: 'Linear',
      onUpdate:   () => { c.gfx.y = Math.sin(this.time.now * .013) * 2.5; c.setDepth(4 + c.y / 100); },
      onComplete: () => { c.gfx.y = 0; if (!c.busy) c.timer = this.time.delayedCall(R(600, 2200), () => this.idle(c)); },
    });
  }

  go(c, tx, ty, cb) {
    c.timer?.destroy(); this.tweens.killTweensOf(c);
    const dist = Phaser.Math.Distance.Between(c.x, c.y, tx, ty);
    this.tweens.add({
      targets: c, x: tx, y: ty, duration: Math.max(dist * 4.5, 350), ease: 'Linear',
      onUpdate:   () => { c.gfx.y = Math.sin(this.time.now * .013) * 2.5; c.setDepth(4 + c.y / 100); },
      onComplete: () => { c.gfx.y = 0; cb?.(); },
    });
  }

  // ── 對話泡泡 ─────────────────────────────────────────────────
  popup(c, text, col, cb) {
    const px = c.x, py = c.y - 55;
    const tmp = this.add.text(-9999, -9999, text, { fontSize:'11px', fontFamily:'monospace' });
    const bw = Math.max(tmp.width + 18, 90), bh = tmp.height + 14; tmp.destroy();
    const bg = this.add.graphics().setDepth(20);
    bg.fillStyle(0xffffff, 0.96); bg.fillRoundedRect(px - bw/2, py - bh, bw, bh, 7);
    bg.fillTriangle(px - 7, py, px + 7, py, px, py + 11);
    bg.lineStyle(2, col, 1); bg.strokeRoundedRect(px - bw/2, py - bh, bw, bh, 7);
    const txt = this.add.text(px, py - bh/2, text, {
      fontSize:'11px', fontFamily:'monospace', color:'#111',
    }).setOrigin(0.5).setDepth(21);
    for (let i = 0; i < 6; i++) {
      const sp = this.add.circle(px + R(-5,5), py - bh, R(2,4), col, 0.85).setDepth(19);
      this.tweens.add({ targets:sp, x:px+R(-45,45), y:py-bh-R(10,55), alpha:0, scale:0,
                        duration:450+i*70, delay:i*45, onComplete:()=>sp.destroy() });
    }
    [bg, txt].forEach(o => o.setAlpha(0));
    this.tweens.add({
      targets:[bg, txt], alpha:1, duration:160,
      onComplete: () => this.time.delayedCall(2800, () =>
        this.tweens.add({ targets:[bg, txt], alpha:0, duration:280,
          onComplete: () => { bg.destroy(); txt.destroy(); cb?.(); } })
      ),
    });
  }
}

// ── 事件記錄 ─────────────────────────────────────────────────
function addLog(action, username) {
  const log = document.getElementById('log');
  const t   = new Date().toLocaleTimeString('zh-TW', { hour12: false });
  const d   = document.createElement('div');
  d.className   = `le ${action.css}`;
  d.textContent = `[${t}]  ${action.icon}  ${username}  ${action.msg}`;
  log.appendChild(d);
  while (log.children.length > 4) log.removeChild(log.children[0]);
}

// ── 申請加入 UI ──────────────────────────────────────────────
function toggleJoinPanel() {
  const p = document.getElementById('join-panel');
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
  document.getElementById('join-msg').textContent = '';
}

async function submitJoin() {
  const username = document.getElementById('join-username').value.trim();
  const msg      = document.getElementById('join-msg');
  if (!username) { msg.textContent = '請輸入 GitHub username'; return; }
  try {
    const res  = await fetch('/api/join', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username }),
    });
    const data = await res.json();
    if (data.ok) {
      msg.style.color = '#3fb950';
      msg.textContent = data.message || '申請已送出！';
      // 記住 username，管理員核准後顯示安裝提示
      localStorage.setItem('guild_username', username);
    } else {
      msg.style.color = '#f85149';
      msg.textContent = data.error || '發生錯誤';
    }
  } catch {
    msg.style.color = '#f85149';
    msg.textContent = '網路錯誤';
  }
}

// ── 啟動 Phaser ──────────────────────────────────────────────
let pendingInit = null; // Phaser 還沒好時暫存 init 訊息

new Phaser.Game({
  type: Phaser.AUTO, width: 800, height: 480,
  parent: 'game-container', backgroundColor: '#1a0d00',
  scene: Guild,
});

// ── WebSocket ────────────────────────────────────────────────
let myUsername = localStorage.getItem('guild_username');
let appSlug    = '';

fetch('/api/config').then(r => r.json()).then(d => { appSlug = d.appSlug; });

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws    = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('conn-status').textContent = '● 已連線';
  };

  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    switch (msg.type) {
      case 'init':
        document.getElementById('conn-status').textContent =
          `● 已連線  |  ${msg.members.length} 位成員`;
        if (window._guild) {
          msg.members.forEach(u => window._guild.addMember(u));
        } else {
          pendingInit = msg; // Phaser 還沒好，先暫存
        }
        break;

      case 'event':
        window._guild?.pushServerEvent(msg);
        break;

      case 'member_join':
        window._guild?.addMember(msg.username);
        // 如果是自己被核准了，顯示安裝 App 提示
        if (msg.username === myUsername && appSlug) {
          const banner = document.getElementById('install-banner');
          const link   = document.getElementById('install-link');
          link.href    = `https://github.com/apps/${appSlug}/installations/new`;
          banner.style.display = 'block';
          setTimeout(() => banner.style.display = 'none', 15000);
        }
        break;

      case 'member_leave':
        window._guild?.removeMember(msg.username);
        break;

      case 'member_app_installed':
        document.getElementById('install-banner').style.display = 'none';
        break;
    }
  };

  ws.onclose = () => {
    document.getElementById('conn-status').textContent = '● 連線中斷，5 秒後重試...';
    setTimeout(connect, 5000);
  };

  ws.onerror = () => ws.close();
}

connect();
</script>
</body>
</html>
